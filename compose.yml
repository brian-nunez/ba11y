services:
  ba11y:
    image: briannunez/ba11y:v1.0.0
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      APP_DATABASE_PATH: "/data/ba11y.db"
      SCAN_WORKER_DB_PATH: "/data/ba11y.db"
      SCAN_WORKER_LOG_PATH: "/data/logs"
      SCAN_WORKER_CONCURRENCY: "3"
      BBAAS_BASE_URL: "https://bbaas.b8z.me"
      BBAAS_API_TOKEN: "replace-with-your-bbaas-api-token"
      BBAAS_API_KEY: ""
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
