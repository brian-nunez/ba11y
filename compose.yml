services:
  ba11y:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      APP_DATABASE_PATH: "/data/ba11y.db"
      SCAN_WORKER_DB_PATH: "/data/ba11y.db"
      SCAN_WORKER_LOG_PATH: "/data/logs"
      SCAN_WORKER_CONCURRENCY: "3"
      BBAAS_BASE_URL: "https://bbaas.b8z.me"
      BBAAS_API_TOKEN: ""
      BBAAS_API_KEY: ""
      BTICK_BASE_URL: ""
      BTICK_API_KEY: ""
      BTICK_API_TOKEN: ""
      BTICK_WEBHOOK_URL: ""
      BTICK_WEBHOOK_SECRET: ""
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "true"
    volumes:
      - ./data:/data
